---
ansible_ssh_pass: "changeme"
ansible_become_pass: "changeme"


pgsql:
  cluster_name: jack-kr-pgsql
  major_version: 15
  minor_version: 5
  patch_version: 1
  build_version: 1
  os_version: el9
  arch_type: x86_64
  bin_type: rpm
  db_name: patroni_testdb
  db_user: jomoon
  db_password: 'changeme'
  home_dir: "/home/postgres"
  base_dir: "/var/lib/pgsql"
  domain: "jtest.pivotal.io"
  repo_url: ""
  download_url: ""
  download: false
  host_num: "{{ groups['all'] | length }}"
  # base_path: /root
  # with_patroni_pkg: True
  net:
    type: "virtual"                # Or Physical
    gateway: "192.168.0.1"
    ipaddr0: "192.168.0.7"
    ipaddr1: "192.168.1.7"
    ipaddr2: "192.168.2.7"
  client:
    net:
      type: "virtual"              # Or Physical
      cores: 1
      ipaddr0: "192.168.0.6"
      ipaddr1: "192.168.1.6"
      ipaddr2: "192.168.2.6"


common:
  sudo_user: jomoon
  sudo_group: jomoon
  sudo_user_home_dir: "/home/jomoon"
  pgsql_pkg_name: "vmware-postgres{{ pgsql.major_version }}"
  pgsql_bin_dir: "/opt/vmware/postgres/{{ pgsql.major_version }}/bin"
  # pgsql_pkg_name: pivotal-postgres


