---
- name: Alternative Python Version
  shell: |
    update-alternatives --install /usr/bin/python python {{ yum_python_version }} 1
    alternatives --set python {{ yum_python_version }}
  register: python2_version_alternatives
  when: install_dep_pkgs


- name: Install the Prerequisties RPM Packages for VMware Postgres Patroni
  package:
    name: "{{ rh_install_pkgs }}"
    state: present
  async: 180
  poll: 5
  register: install_prereq_pkgs
  vars:
    ansible_python_interpreter: "{{ yum_python_version }}"
  when: install_dep_pkgs == true


- name: Install the Python RPM Packages for VMware Postgres Patroni
  package:
    name: "{{ rh7_python_pkgs }}"
    state: present
    skip_broken: yes
  async: 180
  poll: 5
  vars:
    ansible_python_interpreter: "{{ yum_python_version }}"
  when: install_dep_pkgs == true and hostvars[inventory_hostname].ansible_distribution_major_version|int <= 7


- name: Install the Python RPM Packages for VMware Postgres Patroni
  package:
    name: "{{ rh8_python_pkgs }}"
    state: present
    skip_broken: yes
  async: 180
  poll: 5
  register: python3_installed
  vars:
    ansible_python_interpreter: "{{ yum_python_version }}"
  when: install_dep_pkgs == true and hostvars[inventory_hostname].ansible_distribution_major_version|int == 8


- name: Install the Python RPM Packages for VMware Postgres Patroni
  package:
    name: "{{ rh9_python_pkgs }}"
    state: present
    skip_broken: yes
  async: 180
  poll: 5
  register: python311_installed
  vars:
    ansible_python_interpreter: "{{ yum_python_version }}"
  when: install_dep_pkgs == true and hostvars[inventory_hostname].ansible_distribution_major_version|int >= 9

