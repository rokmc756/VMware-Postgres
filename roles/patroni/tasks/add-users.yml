- name: Create the database specified in vars
  become: true
  become_user: postgres
  vars:
    ansible_python_interpreter: /usr/bin/python2
  postgresql_db: name={{ db_name }}
       template='template0'
       state=present
  register: database_created
  when: inventory_hostname in groups['workers'][0]

- name: Ensure user has access to the new database
  become: true
  become_user: postgres
  vars:
    ansible_python_interpreter: /usr/bin/python2
  postgresql_user: db={{ db_name }}
       name={{ db_user }}
       password={{ db_password }}
       priv=ALL
       state=present
  register: user_created
  when: inventory_hostname in groups['workers'][0]

- name: Ensure user does not have unnecessary permissions
  become: true
  become_user: postgres
  vars:
    ansible_python_interpreter: /usr/bin/python2
  postgresql_user: name={{ db_user }}
       role_attr_flags=SUPERUSER,CREATEDB,CREATEROLE,INHERIT,LOGIN,REPLICATION,PYPASSRLS
       state=present
  register: permission_enroled
  when: inventory_hostname in groups['workers'][0]
  # role_attr_flags=NOSUPERUSER,NOCREATEDB
  # role_attr_flags
  # [NO]SUPERUSER
  # [NO]CREATEROLE
  # [NO]CREATEDB
  # [NO]INHERIT
  # [NO]LOGIN
  # [NO]REPLICATION
  # [NO]BYPASSRLS
  # https://docs.ansible.com/ansible/2.8/modules/postgresql_user_module.html
