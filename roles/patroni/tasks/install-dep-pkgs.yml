---
#
- name: Install the 'Development tools' and perl package group and others for VMware Postgres Dependencies
  become: true
  yum:
    name: "{{ item }}"
    state: present
  async: 180
  poll: 5
  with_items:
    - "perl"
    - "perl-libs"
    - "@Development tools"
    - "epel-release"
    - "firewalld"
    - "readline-devel"
    - "libicu-devel"
    - "rsyslog"
    - "postgresql-devel"
  register: vmware_postgres_depenecies_packages_installed
  when: install_dep_pkgs
#    - python-psycopg2
#    - python27-python-psycopg2
#    - python3-policycoreutils
#    - python2-libselinux
#    - libselinux-python2
#    - policycoreutils-python-utils
#    - libselinux-python3

#
- name: Install Patroni prerequisites rpm packages on all nodes in workers group for RHEL or CentOS {{  hostvars[inventory_hostname].ansible_distribution_major_version }}
  become: true
  yum:
    name: "{{ item }}"
    state: present
    skip_broken: yes
  async: 180
  poll: 5
  with_items:
    - python3
    - python3-libs
    - python3-devel
    - python3-setuptools
    - python3-rpm-generators
    - python3-PyYAML
    - python3-pathspec
    - python3-pip
    - python3-psycopg2
    - gcc
    - yamllint
    - daemonize
  register: patroni_prereq_rpm_packages_installed
  when: install_dep_pkgs

#
- name: Install Python 3.9 for RHEL or CentOS {{  hostvars[inventory_hostname].ansible_distribution_major_version }}
  become: true
  yum:
    name: "{{ item }}"
    state: present
    skip_broken: yes
  async: 180
  poll: 5
  with_items:
    - python39
    - python39-pip
    - python39-libs
    - python39-devel
  register: python39_installed
  when: install_dep_pkgs == true and hostvars[inventory_hostname].ansible_distribution_major_version|int >= 8

#
- name: Alternative python3.9 version to python3
  become: true
  become_user: root
  shell: |
    update-alternatives --install /usr/bin/python3 python3 /usr/local/bin/python3.9 3
    alternatives --set python3 /usr/bin/python3.9
    alternatives --set python /usr/bin/python3
  register: python3_version_alternatives
  when: install_dep_pkgs == true and hostvars[inventory_hostname].ansible_distribution_major_version|int >= 8
  # update-alternatives --install /usr/bin/unversioned-python python /usr/bin/python3.9 1

# - python-psycopg2
# - etcd
# - python34
# - python34-libs
# - python34-setuptools
# - python36-PyYAML
# - python36-pathspec

#
- name: Install the etcd and Patroni prerequisites on all three nodes for CentOS 7
  become: true
  yum:
    name: "{{ item }}"
    state: present
    skip_broken: yes
  async: 180
  poll: 5
  register: etcd_prereq_rpm_packages_installed
  with_items:
    - python-psycopg2
    - etcd
  when:
    - hostvars[inventory_hostname].ansible_distribution_major_version|int == 7
    - install_dep_pkgs

#
- name: Install ETCD rpm package on all nodes in workers group for RHEL or Rocky {{  hostvars[inventory_hostname].ansible_distribution_major_version }}
  become: true
  yum:
    name: "/home/jomoon/{{ item }}"
    state: present
    disable_gpg_check: yes
  async: 60
  poll: 5
  register: etcd_rpm_packages_installed
  with_items:
    - "etcd-{{ etcd_version }}.{{ rhel_version }}.x86_64.rpm"
  when: hostvars[inventory_hostname].ansible_distribution_major_version|int >= 8

#
- name: Install ETCD and Patroni prerequisites rpm package on all nodes in workers group for RHEL or Rocky {{  hostvars[inventory_hostname].ansible_distribution_major_version }}
  become: true
  yum:
    name: "{{ item }}"
    state: present
    skip_broken: yes
  async: 180
  poll: 5
  with_items:
    - python3-pip
  register: etcd_patroni_prereq_rpm_packages_installed
  when:
    - hostvars[inventory_hostname].ansible_distribution_major_version|int >= 8
    - install_dep_pkgs
#    - python39-pip
# - python34
# - python34-libs
# - python34-setuptools
# - python36-PyYAML
# - python36-pathspec
