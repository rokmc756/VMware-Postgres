---
# Configure and Install PGAutoFailover on {{ ansible_distribution }}
#
- set_fact:
    rh_install_pkgs: "{{ rh_common_dep_pkgs ~ ',' ~ rh7_dep_pkgs ~ ',' ~ rh7_python_pkgs }}"
  when: ( ansible_distribution == "RedHat" or ansible_distribution == "CentOS" or ansible_distribution == "Rocky" ) and ansible_distribution_major_version|int <= 7
- set_fact:
    rh_install_pkgs: "{{ rh_common_dep_pkgs ~ ',' ~ rh8_dep_pkgs ~ ',' ~ rh8_python_pkgs }}"
  when: ( ansible_distribution == "RedHat" or ansible_distribution == "CentOS" or ansible_distribution == "Rocky" ) and ansible_distribution_major_version|int == 8
- set_fact:
    rh_install_pkgs: "{{ rh_common_dep_pkgs ~ ',' ~ rh9_dep_pkgs ~ ',' ~ rh9_python_pkgs }}"
  when: ( ansible_distribution == "RedHat" or ansible_distribution == "CentOS" or ansible_distribution == "Rocky" ) and ansible_distribution_major_version|int >= 9

#
- name: Define package names for VMware Postgres
  set_fact:
    pgsql_pkg_name: "{{ common.pgsql_pkg_name }}-{{ pgsql.major_version }}.{{ pgsql.minor_version }}-{{ pgsql.patch_version }}.{{ pgsql.os_version }}"

#
- name: Install Common Prerequisties RPM Packages for VMware Postgres PGAutoFailover
  yum:
    name: "{{ item }}"
    state: present
    skip_broken: yes
  async: 120
  poll: 5
  with_items: "{{ rh_install_pkgs }}"
  when: install_dep_pkgs

#
- name: Alternative python3 version to python
  become: true
  become_user: root
  shell: |
    update-alternatives --install /usr/bin/python python /usr/bin/python3 1
    alternatives --set python /usr/bin/python3
  register: python3_version_alternatives
  when: install_dep_pkgs and hostvars[inventory_hostname].ansible_distribution_major_version|int <= 7
  # update-alternatives --install /usr/bin/python python /usr/local/bin/python3 3
  # update-alternatives --install /usr/bin/unversioned-python python /usr/bin/python3.9 1

#
- name: Copy the vmwawre-postgres rpm file to all hosts in cluster
  copy: src={{ pgsql_pkg_name }}.{{ pgsql.arch_type }}.{{ pgsql.bin_type }} dest={{ common.sudo_user_home_dir }}/{{ pgsql_pkg_name }}.{{ pgsql.arch_type }}.{{ pgsql.bin_type }} mode=0644 owner=jomoon group=jomoon

#
- name: Install VMware Postgres on all hosts as root
  yum:
    name: "{{ common.sudo_user_home_dir }}/{{ pgsql_pkg_name }}.{{ pgsql.arch_type }}.{{ pgsql.bin_type }}"
    state: present
    disable_gpg_check: true

