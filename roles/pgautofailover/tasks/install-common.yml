#    path: /var/lib/pgsql
#    owner: postgres
#    group: postgres
#    mode: 0755

- name: Define package names for VMware Postgres/Patroni/ETCD
  set_fact:
    pgsql_pkg_name: "{{ common.pgsql_pkg_name }}-{{ pgsql.major_version }}.{{ pgsql.minor_version }}-{{ pgsql.patch_version }}.{{ pgsql.os_version }}.{{ pgsql.arch_type }}.{{ pgsql.bin_type }}"

#
- name: Copy the vmwawre-postgres rpm file to all hosts in cluster
  copy: src={{ pgsql_pkg_name }}.x86_64.rpm dest={{ common.sudo_user_home_dir }}/{{ pgsql_pkg_name }}.x86_64.rpm mode=0644 owner=jomoon group=jomoon

#
- name: Install VMware Postgres on all hosts as root
  yum:
    name: {{ common.sudo_user_home_dir }}/{{ pgsql_pkg_name }}.x86_64.rpm
    state: present
    disable_gpg_check: true

#
- name: Make sure we have a 'wheel' group
  group:
    name: wheel
    state: present

#
- name: Allow 'wheel' group to have passwordless sudo
  lineinfile:
    dest: /etc/sudoers
    state: present
    regexp: '^%wheel'
    line: '%wheel ALL=(ALL) NOPASSWD: ALL'
    validate: 'visudo -cf %s'

#
- name: Add postgres user to sudo group
  shell: usermod -aG wheel postgres
  args:
    executable: /bin/bash

#
- name: Install Common dependent Packages for VMware Postgres PGAutoFailover
  yum:
    name: "{{ item }}"
    state: present
    skip_broken: yes
  async: 120
  poll: 5
  with_items: "{{ rh_common_dep_pkgs }}"
  when: install_dep_pkgs

#
- name: Install Python3 Packages on All Nodes
  become: true
  yum:
    name: "{{ item }}"
    state: present
    skip_broken: yes
  async: 120
  poll: 5
  with_items: "{{ rh8_python_pkgs }}"
  when: install_dep_pkgs and hostvars[inventory_hostname].ansible_distribution_major_version|int >= 8

#
- name: Alternative python3 version to python
  become: true
  become_user: root
  shell: |
    update-alternatives --install /usr/bin/python python /usr/bin/python3 1
    alternatives --set python /usr/bin/python3
  register: python3_version_alternatives
  when: install_dep_pkgs and hostvars[inventory_hostname].ansible_distribution_major_version|int <= 7

