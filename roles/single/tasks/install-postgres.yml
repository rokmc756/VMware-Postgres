---
# Install Sinlge Postgres Database
#
- name: initialize your PostgresL instance
  become: true
  become_user: postgres
  shell: ( source /var/lib/pgsql/.bash_profile ; {{ bin_dir }}/initdb -D /var/lib/pgsql/data )
  register: postgres_instance_initialized
  args:
    chdir: "/var/lib/pgsql"
    executable: /bin/bash

#
- name: Create a single non-HA Postgres server
  become: true
  become_user: postgres
  shell: ( source /var/lib/pgsql/.bash_profile ; {{ bin_dir }}/postgres -D /var/lib/pgsql/data > /var/lib/pgsql/data/logfile 2>&1 & )
  register: postgres_instance_created
  args:
    chdir: "/var/lib/pgsql"
    executable: /bin/bash

#
- name: Verify that pg_auto_failover/postgres was installed properly
  become: true
  become_user: postgres
  shell: ( source /var/lib/pgsql/.bash_profile ; {{ bin_dir }}/psql -c "select version()" )
  register: postgres_install_verified
  args:
    chdir: "/var/lib/pgsql"
    executable: /bin/bash

- name: Verify that postgres was installed properly
  become: true
  become_user: postgres
  shell: ( source /var/lib/pgsql/.bash_profile ; {{ bin_dir }}/pg_ctl -V )
  register: pg_ctl_install_verified
  args:
    chdir: "/var/lib/pgsql"
    executable: /bin/bash

