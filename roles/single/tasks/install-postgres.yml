#
- name: Insert executable binary path into .bashrc for VMware Postgres {{ major_version }}
  become: true
  become_user: postgres
  lineinfile:
    path: "{{ item }}"
    line: "export PATH={{ bin_dir }}:$PATH"
  with_items:
    - "/var/lib/pgsql/.bash_profile"
    - "/home/postgres/.bashrc"

  #  path: /var/lib/pgsql/.bashrc

#
- name: Grant user access from network 192.168.0.0/24 access for access with cert authentication.
  become: true
  become_user: postgres
  postgresql_pg_hba:
    dest: /var/lib/pgsql/data/pg_hba.conf
    contype: host
    users: all
    source: 192.168.0.0/24
    databases: all
    method: trust

#
- name: Replace database directory
  become: true
  become_user: postgres
  replace:
    path: /var/lib/pgsql/.bash_profile
    regexp: '^(.*)PGDATA=(.*)$'
    replace: 'PGDATA=//var/lib/pgsql/data'
    backup: yes

#
- name: Verify the current state of postgres instance
  become: true
  become_user: postgres
  shell: ( ps -ef | grep postgres )
  register: postgres_instance_state_verified
  # shell: ( ps -ef | grep postgres )

#
- name: Verify the current state of postgres
  become: true
  become_user: postgres
  shell: ( source /var/lib/pgsql/.bash_profile ; {{ bin_dir }}/psql -c "\l" )
  register: postgres_state_verified
  args:
    chdir: "/var/lib/pgsql"
    executable: /bin/bash

#
- debug: msg={{ postgres_state_verified }}
  tags:
    - print_debug
